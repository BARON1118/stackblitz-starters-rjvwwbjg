<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>原生 JS x Supabase 即時聊天室</title>
    <link rel="stylesheet" href="styles.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="auth-section" class="auth-section">
        <h3>🚀 快速登入</h3>
        <div class="input-area">
            <input type="email" id="email" placeholder="輸入你的 Email" required>
            <button id="login-btn">傳送魔術連結</button>
        </div>
        <p id="auth-msg" style="font-size: 12px; color: #e63946;"></p>
    </div>
    
    <hr>
    
    <div id="chat-interface" style="display:none;">
        </div>
    <div class="chat-container">
        <header>
            <h2>💬 即時聊天室</h2>
        </header>

        <div id="message-box" class="message-box">
            <p class="loading">載入訊息中...</p>
        </div>

        <div class="input-area">
            <input type="text" id="username" placeholder="你的暱稱" value="訪客">
            <input type="text" id="content" placeholder="輸入訊息..." autocomplete="off">
            <button id="send-btn">發送</button>
        </div>
    </div>
    <div class="chat-container">
        <header><h2>💬 多媒體即時聊天</h2></header>
    
        <div id="message-box" class="message-box">
            <p class="loading">載入訊息中...</p>
        </div>
    
        <div id="status-bar" style="font-size: 12px; color: #666; padding: 5px 15px; height: 20px;"></div>
    
        <div class="input-area">
            <input type="text" id="username" placeholder="暱稱" value="訪客" style="width: 70px;">
            <input type="text" id="content" placeholder="輸入訊息..." autocomplete="off">
            
            <label for="file-input" class="icon-btn">📎</label>
            <input type="file" id="file-input" accept="image/*,video/*" style="display: none;">
            
            <button id="record-btn" class="icon-btn">🎤</button>
            
            <button id="send-btn">發送</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
